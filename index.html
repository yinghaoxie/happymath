<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="数学星环 - 超能觉醒计划，通过游戏化学习掌握初中数学核心知识">
  <meta name="theme-color" content="#0f0c29">
  
  <title>数学星环 · 超能觉醒计划</title>
  
  <!-- 预加载关键资源 -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  
  <!-- 所有样式使用自定义 CSS + 内联样式，无需 Tailwind -->
  
  <!-- 中文字体 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/ma-shan-zheng@5.0.18/index.css">
  
  <!-- 自定义样式 -->
  <link rel="stylesheet" href="./src/css/styles.css">
</head>
<body>
  <!-- 星空背景 -->
  <div id="stars" class="stars" aria-hidden="true"></div>

  <!-- 主应用 -->
  <div id="main-app" role="application" aria-label="数学星环应用">
    <div class="app-layout">
      <!-- 左侧科技仪表盘导航 -->
      <nav class="side-nav" role="navigation" aria-label="主导航">
        <div class="nav-brand">
          <span aria-hidden="true">🌟</span>
          <span>数学星环</span>
        </div>
        <div class="player-tag" id="player-name-display"></div>

        <div class="nav-buttons">
          <button class="nav-btn active" data-page="map" onclick="showPage('map')" aria-label="星系地图">
            🗺️ 地图
          </button>
          <button class="nav-btn" data-page="achievements" onclick="showPage('achievements')" aria-label="成就系统">
            🏆 成就
          </button>
          <button class="nav-btn" data-page="profile" onclick="showPage('profile')" aria-label="个人资料">
            👤 档案
          </button>
        </div>

        <!-- 仪表盘状态区 -->
        <div class="nav-dashboard">
          <div class="dash-item" data-tooltip="答对题目获得逻辑币，连续答对有多重加成">
            <div class="dash-label">💰 逻辑币</div>
            <div class="dash-value" id="coin-count">100</div>
          </div>
          <div class="dash-item" data-tooltip="每答对一题 +5 星光，完成整个星系额外奖励">
            <div class="dash-label">⭐ 星光</div>
            <div class="dash-value" id="star-count">0</div>
          </div>
          <div class="dash-item" data-tooltip="积累经验值升级，高等级解锁新星系">
            <div class="dash-label">🎖️ 等级</div>
            <div class="dash-value">Lv.<span id="player-level">1</span></div>
          </div>
          <div class="dash-item" data-tooltip="全部答对获得完美评价，积累完美次数">
            <div class="dash-label">💯 完美</div>
            <div class="dash-value" id="perfect-count">0</div>
          </div>
          <div class="dash-item dash-item-wide" data-tooltip="本次探索的实时耗时，每秒更新">
            <div class="dash-label">⏱️ 探索时间</div>
            <div class="dash-value" id="explore-seconds">0s</div>
          </div>
          <div class="exp-bar-wrap">
            <div class="exp-bar-bg">
              <div id="exp-bar" class="exp-bar-fill" style="width: 0%" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
            </div>
          </div>
        </div>
      </nav>

      <!-- 右侧主内容区 -->
      <div class="app-content">
    
    <!-- 星系地图页面 -->
    <main id="page-map" class="page active galaxy-map" role="main" aria-labelledby="map-heading">
      <header class="map-header">
        <h1 id="map-heading" class="map-title font-title">星系地图</h1>
      </header>
      
      <div id="galaxy-grid" class="galaxy-grid" role="list" aria-label="星系列表">
        <!-- 由 JS 动态渲染 -->
      </div>
    </main>
    
    <!-- 学习页面 -->
    <section id="page-learn" class="page learning-page" role="region" aria-labelledby="learn-heading">
      <h1 id="learn-heading" class="visually-hidden">学习内容</h1>
      <div id="learning-content">
        <!-- 由 JS 动态渲染 -->
      </div>
    </section>
    
    <!-- 成就页面 -->
    <section id="page-achievements" class="page galaxy-map" role="region" aria-labelledby="achievements-heading">
      <header class="map-header">
        <h1 id="achievements-heading" class="map-title font-title">成就殿堂</h1>
        <p style="color: #e2e8f0; margin-top: 0.5rem;">解锁成就，证明你的数学实力！</p>
      </header>
      
      <div id="achievements-grid" class="achievements-grid" role="list" aria-label="成就列表">
        <!-- 由 JS 动态渲染 -->
      </div>
    </section>
    
    <!-- 个人档案页面 -->
    <section id="page-profile" class="page galaxy-map" role="region" aria-labelledby="profile-heading">
      <header class="map-header">
        <h1 id="profile-heading" class="map-title font-title">能力档案</h1>
        <p style="color: #e2e8f0; margin-top: 0.5rem;">查看你的数学能力雷达图</p>
      </header>
      
      <div style="max-width: 600px; margin: 0 auto;">
        <canvas id="radarCanvas" width="500" height="500" aria-label="能力雷达图" role="img"></canvas>
        
        <div style="margin-top: 2rem; background: rgba(99, 102, 241, 0.2); border-radius: 20px; padding: 2rem;">
          <h2 style="text-align: center; color: #fbbf24; margin-bottom: 1.5rem;">详细统计</h2>
          
          <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem;">
            <div style="background: rgba(0, 0, 0, 0.3); padding: 1rem; border-radius: 12px;">
              <div style="color: #e2e8f0; font-size: 0.9rem;">已学关卡</div>
              <div style="color: #fbbf24; font-size: 1.5rem; font-weight: bold;"><span id="learned-count">0</span> / 12</div>
            </div>
            
            <div style="background: rgba(0, 0, 0, 0.3); padding: 1rem; border-radius: 12px;">
              <div style="color: #e2e8f0; font-size: 0.9rem;">跳过关卡</div>
              <div style="color: #6b7280; font-size: 1.5rem; font-weight: bold;"><span id="skipped-count">0</span></div>
            </div>
            
            <div style="background: rgba(0, 0, 0, 0.3); padding: 1rem; border-radius: 12px;">
              <div style="color: #e2e8f0; font-size: 0.9rem;">当前称号</div>
              <div style="color: #f472b6; font-size: 1.1rem; font-weight: bold;" id="title-display">算术见习生</div>
            </div>
          </div>
          
          <h3 style="color: #fbbf24; margin: 1.5rem 0 1rem;">能力值</h3>
          <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 0.75rem;">
            <div style="background: rgba(0, 0, 0, 0.3); padding: 0.75rem; border-radius: 8px;">
              <div style="color: #e2e8f0; font-size: 0.85rem;">计算爆发力</div>
              <div style="color: #60a5fa; font-weight: bold;"><span id="stat-calc">30</span></div>
            </div>
            <div style="background: rgba(0, 0, 0, 0.3); padding: 0.75rem; border-radius: 8px;">
              <div style="color: #e2e8f0; font-size: 0.85rem;">空间想象力</div>
              <div style="color: #a78bfa; font-weight: bold;"><span id="stat-space">20</span></div>
            </div>
            <div style="background: rgba(0, 0, 0, 0.3); padding: 0.75rem; border-radius: 8px;">
              <div style="color: #e2e8f0; font-size: 0.85rem;">逻辑推理力</div>
              <div style="color: #fbbf24; font-weight: bold;"><span id="stat-logic">25</span></div>
            </div>
            <div style="background: rgba(0, 0, 0, 0.3); padding: 0.75rem; border-radius: 8px;">
              <div style="color: #e2e8f0; font-size: 0.85rem;">逆向思维</div>
              <div style="color: #f472b6; font-weight: bold;"><span id="stat-reverse">15</span></div>
            </div>
            <div style="background: rgba(0, 0, 0, 0.3); padding: 0.75rem; border-radius: 8px;">
              <div style="color: #e2e8f0; font-size: 0.85rem;">抗挫折力</div>
              <div style="color: #10b981; font-weight: bold;"><span id="stat-resist">40</span></div>
            </div>
          </div>
        </div>
      </div>
    </section>
    </div>
    </div>
  </div>
  
  <!-- 应用脚本（ES 模块） -->
  <script type="module" src="./src/js/app.js?v=2"></script>
</body>
</html>
